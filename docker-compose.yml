services:
  # ── MS SQL Server ─────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: coshop-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD:-CoShop_Dev_Password123!}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD:-CoShop_Dev_Password123!}\" -Q \"SELECT 1\" -No -C || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 45s   # SQL Server needs time on first boot to initialise system DBs

  # ── .NET Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./CoShop
      dockerfile: Dockerfile
    container_name: coshop-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=CoShop;User Id=sa;Password=${SA_PASSWORD:-CoShop_Dev_Password123!};TrustServerCertificate=True;Connection Timeout=60
      - Jwt__Key=${JWT_KEY:-CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_MIN_32_CHARS}
      - Jwt__Issuer=CoShop
      - Jwt__Audience=CoShopUsers
      - Cors__AllowedOrigins__0=http://localhost
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    # restart on-failure lets Docker retry if startup fails while SQL Server is warming up
    restart: on-failure

  # ── Angular Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./coshop-frontend
      dockerfile: Dockerfile
    container_name: coshop-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver-data: